<style>
:root{--fg:#0F0F0F;--fg-2:#3A3A38;--muted:#71716E;--faint:#A3A29E;--hair:#E2E1DE;--hair-2:#EEEDEA;--bg:#FCFCFB;--tint:#F4F3F0;--accent:#1D4ED8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--fg);line-height:1.75;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.top{position:sticky;top:0;z-index:10;background:rgba(252,252,251,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--hair);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.top a.home{font-size:14px;font-weight:800;letter-spacing:-.03em;color:var(--fg);text-decoration:none}
.top a.back{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500}
.top a.back:hover{color:var(--fg)}
.wrap{max-width:720px;margin:0 auto;padding:56px 24px 80px}
.tag{display:inline-block;font-size:12px;font-weight:600;color:var(--accent);letter-spacing:.02em;margin-bottom:16px}
h1{font-size:clamp(26px,4.5vw,36px);font-weight:800;letter-spacing:-.035em;line-height:1.28;margin-bottom:20px}
.meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--faint);padding-bottom:28px;margin-bottom:40px;border-bottom:1px solid var(--hair)}
.lede{background:#EEF2FB;border-radius:14px;padding:22px 24px;margin-bottom:40px}
.lede .k{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px}
.lede p{font-size:16px;line-height:1.75;margin:0}
h2{font-size:21px;font-weight:800;letter-spacing:-.03em;margin:44px 0 18px;line-height:1.35}
p{font-size:16px;color:var(--fg-2);margin-bottom:18px}
b,strong{color:var(--fg);font-weight:700}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:28px 0}
.col{border:1px solid var(--hair);border-radius:14px;padding:20px 22px}
.col .h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;margin-bottom:14px}
.col.bad .h{color:#B4443A}
.col.good .h{color:#1B7A54}
.col ul{list-style:none}
.col li{font-size:14px;line-height:1.55;color:var(--muted);padding-left:16px;position:relative;margin-bottom:11px}
.col li:last-child{margin-bottom:0}
.col li::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--faint)}
.col li b{color:var(--fg)}
.vs{border:1px solid var(--hair);border-radius:14px;overflow:hidden;margin:28px 0}
.vs-row{display:grid;grid-template-columns:1fr 1fr}
.vs-cell{padding:20px 22px}
.vs-cell:first-child{border-right:1px solid var(--hair)}
.vs-cell .t{font-size:15px;font-weight:800;margin-bottom:6px}
.vs-cell .s{font-size:12px;color:var(--faint);margin-bottom:12px}
.vs-cell p{font-size:14px;line-height:1.65;color:var(--muted);margin:0}
.steps{margin:28px 0;display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:16px;border:1px solid var(--hair);border-radius:14px;padding:18px 20px}
.step .n{flex:0 0 32px;height:32px;border-radius:50%;background:var(--tint);display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--fg)}
.step .t{font-size:15px;font-weight:800;margin-bottom:4px}
.step p{font-size:14px;line-height:1.65;color:var(--muted);margin:0}
.tip{background:#FBF3E4;border-radius:14px;padding:22px 24px;margin:32px 0}
.tip .h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#9A6B12;margin-bottom:10px}
.tip p{font-size:15px;color:var(--fg);margin:0;line-height:1.75}
.faq{margin-top:48px;border-top:1px solid var(--hair);padding-top:36px}
.faq h2{margin-top:0}
.faq details{border-bottom:1px solid var(--hair-2);padding:16px 0}
.faq summary{font-size:15.5px;font-weight:700;cursor:pointer;list-style:none;color:var(--fg)}
.faq summary::-webkit-details-marker{display:none}
.faq summary::before{content:"+ ";color:var(--accent);font-weight:800}
.faq details[open] summary::before{content:"− "}
.faq .a{font-size:14.5px;color:var(--muted);line-height:1.75;margin-top:12px}
.cta{margin-top:48px;display:flex;flex-direction:column;gap:14px;align-items:flex-start}
.cta-btn{display:inline-block;background:var(--fg);color:#fff;font-size:15px;font-weight:700;padding:15px 28px;border-radius:10px;text-decoration:none;transition:background .2s}
.cta-btn:hover{background:#000}
.cta .note{font-size:13px;color:var(--faint)}
@media(max-width:560px){.cols{grid-template-columns:1fr}.vs-row{grid-template-columns:1fr}.vs-cell:first-child{border-right:0;border-bottom:1px solid var(--hair)}}
</style>
</head>
<body>
<header class="top">
  <a class="home" href="../index.html">MAISON ELITE</a>
  <a class="back" href="../index.html{{BACK}}">← {{CAT}} 목록</a>
</header>
<article class="wrap">
  <span class="tag">{{CAT}} · {{TAG}}</span>
  <h1>{{TITLE}}</h1>
  <div class="meta"><span>{{DATE_DOT}}</span></div>
  <div class="lede"><div class="k">{{LEDE_LABEL}}</div><p>{{LEDE}}</p></div>
  {{SECTIONS}}
  <div class="tip"><div class="h">◆ {{TIP_LABEL}}</div><p>{{TIP}}</p></div>
  <div class="faq"><h2>자주 묻는 질문</h2>{{FAQ}}</div>
  <div class="cta"><a class="cta-btn" href="../index.html{{CTA_HREF}}">{{CTA_T}}</a><span class="note">{{CTA_N}}</span></div>
</article>
</body>
</html>
